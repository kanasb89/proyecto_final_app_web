services:
  postgres:
    image: postgres:16-alpine
    container_name: ProyoctoWEB-DB
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: "ProyectoWEB"
    ports:
      - "5440:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d \"ProyectoWEB\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: